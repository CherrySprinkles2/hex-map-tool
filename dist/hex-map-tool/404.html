<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hex Map Tool</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect shim.
      // Encodes the full path into the query string so index.html can restore it.
      var segmentCount = 1; // number of path segments in the repo name (1 for /hex-map-tool)
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .split('/')
            .slice(1 + segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <clipPath id="village-clip">
      <circle cx="30" cy="30" r="30"/>
    </clipPath>
  </defs>

  <!-- Ground -->
  <circle cx="30" cy="30" r="30" fill="#7ec850"/>

  <g clip-path="url(#village-clip)">

    <!-- Single dirt track -->
    <rect x="0" y="27" width="60" height="5" fill="#a08060"/>

    <!-- ═══ Building 1: Inn / village hall (north of track) ═══ -->
    <rect x="10" y="11" width="16" height="12" fill="#012731"/>

    <!-- ═══ Building 2: House (south of track) ═══ -->
    <rect x="34" y="35" width="12" height="10" fill="#012731"/>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <clipPath id="town-clip">
      <circle cx="30" cy="30" r="30"/>
    </clipPath>
  </defs>

  <!-- Ground -->
  <circle cx="30" cy="30" r="30" fill="#7ec850"/>

  <g clip-path="url(#town-clip)">

    <!-- Main street (horizontal) -->
    <rect x="0"  y="27" width="60" height="5" fill="#a08060"/>
    <!-- Side street (T-intersection from top) -->
    <rect x="27" y="0"  width="5"  height="29" fill="#a08060"/>

    <!-- ═══ LARGE BUILDING: Manor / market (top-left) ═══ -->
    <rect x="4"  y="4"  width="20" height="19" fill="#012731"/>

    <!-- ═══ Houses: top-right ═══ -->
    <rect x="34" y="6"  width="9" height="8" fill="#012731"/>
    <rect x="46" y="6"  width="9" height="8" fill="#012731"/>
    <rect x="36" y="17" width="9" height="7" fill="#012731"/>

    <!-- ═══ Houses: below main street ═══ -->
    <rect x="5"  y="34" width="9" height="8" fill="#012731"/>
    <rect x="17" y="34" width="9" height="8" fill="#012731"/>
    <rect x="34" y="34" width="9" height="8" fill="#012731"/>
    <rect x="46" y="34" width="9" height="8" fill="#012731"/>
    <rect x="10" y="45" width="9" height="8" fill="#012731"/>
    <rect x="38" y="45" width="9" height="8" fill="#012731"/>

  </g>
</svg>

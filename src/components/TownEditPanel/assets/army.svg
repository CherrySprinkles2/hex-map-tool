<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 28">

  <!-- Drop shadow -->
  <path d="M1,1 L19,1 L19,17 Q19,27 10,27 Q1,27 1,17 Z"
        fill="rgba(0,0,0,0.3)" transform="translate(0.6,0.9)"/>

  <!-- Shield body -->
  <path d="M1,1 L19,1 L19,17 Q19,27 10,27 Q1,27 1,17 Z"
        fill="#8B1A1A" stroke="#1e0000" stroke-width="1.2"/>

  <!-- Top-left highlight -->
  <path d="M2,2 L10,2 L10,11 Q5,11 2,16 Z"
        fill="rgba(255,255,255,0.15)"/>

  <!-- Central spine -->
  <line x1="10" y1="2"  x2="10" y2="26" stroke="rgba(0,0,0,0.3)" stroke-width="0.7"/>

  <!-- Horizontal crossbar -->
  <line x1="2"  y1="11" x2="18" y2="11" stroke="rgba(0,0,0,0.3)" stroke-width="0.7"/>

  <!-- Shield boss -->
  <circle cx="10" cy="12.5" r="2.2"
          fill="rgba(255,255,255,0.2)" stroke="rgba(0,0,0,0.3)" stroke-width="0.6"/>

</svg>
